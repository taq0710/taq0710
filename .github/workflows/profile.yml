name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "17 7 * * *"
    - cron: "41 13 * * *"
    - cron: "28 19 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib

    steps:
      - name: Check Extra Run
        run: |
          CURRENT_HOUR=$(date +%H)

          echo "Current hour: $CURRENT_HOUR"

          # nếu là job cố định 2h sáng thì luôn chạy
          if [ "$CURRENT_HOUR" = "02" ]; then
            echo "Main daily run"
            exit 0
          fi

          # các job phụ sẽ random skip
          RANDOM_NUM=$((RANDOM % 100))

          echo "Random: $RANDOM_NUM"

          # 50% cơ hội skip
          if [ $RANDOM_NUM -lt 50 ]; then
            echo "Skip extra run"
            exit 1
          fi

      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: taq0710

      - name: Rotate Image Random
        run: |
          STYLES=(
            "profile-night-rainbow.svg"
            "profile-night-view.svg"
            "profile-night-green.svg"
            "profile-gitblock.svg"
            "profile-green-animate.svg"
            "profile-green.svg"
            "profile-season-animate.svg"
            "profile-season.svg"
            "profile-south-season-animate.svg"
            "profile-south-season.svg"
          )

          INDEX=$((RANDOM % 10))
          SELECTED=${STYLES[$INDEX]}

          cp profile-3d-contrib/$SELECTED profile-3d-contrib/profile-current.svg

          echo "Selected style: $SELECTED"

      - name: Commit & Push
        run: |
          git config user.name taq0710
          git config user.email taq0710@users.noreply.github.com

          git add -A .
          git commit -m "Update: random profile rotation" || exit 0

          git push origin main
